# 无 Ollama 依赖：需先运行 scripts/start-ollama-embedding.sh 启动 ollama-nomic-embed-text 容器
version: "3.8"

networks:
  default:
    external: true
    name: echo-fade-memory-net

services:
  echo-fade-memory:
    image: echo-fade-memory:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HOME: /root
      ECHO_FADE_MEMORY_HOME: /root/.echo-fade-memory
      ECHO_FADE_MEMORY_WORKSPACE: echo-fade-memory-dev
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-chromem}
      EMBEDDING_TYPE: ollama
      EMBEDDING_URL: http://host.docker.internal:11434
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_DIMENSIONS: "768"
    volumes:
      - ${HOME}/.echo-fade-memory:/root/.echo-fade-memory
