# 含 Ollama：单容器自动拉取 nomic-embed-text，开箱即用
version: "3.8"

services:
  ollama-nomic-embed-text:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-embed-data:/root/.ollama
    command: ["sh", "-c", "ollama serve & sleep 15 && ollama pull nomic-embed-text && wait"]

  echo-fade-memory:
    build: .
    depends_on:
      - ollama-nomic-embed-text
    ports:
      - "8080:8080"
    environment:
      HOME: /root
      ECHO_FADE_MEMORY_HOME: /root/.echo-fade-memory
      ECHO_FADE_MEMORY_WORKSPACE: echo-fade-memory
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-lancedb}
      EMBEDDING_TYPE: ollama
      EMBEDDING_URL: http://ollama-nomic-embed-text:11434
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_DIMENSIONS: "768"
    volumes:
      - ${HOME}/.echo-fade-memory:/root/.echo-fade-memory

volumes:
  ollama-embed-data:
