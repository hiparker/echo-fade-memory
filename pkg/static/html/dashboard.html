<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo Fade Memory Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
    <style>
      body { margin: 0; background: #f5f7fa; }
      #root { min-height: 100vh; }
      .app-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
      .app-header-title { color: #fff; margin: 0; font-size: 18px; font-weight: 600; }
      .trend-chart { width: 100%; overflow-x: auto; }
      .trend-bars { display: flex; align-items: flex-end; gap: 8px; min-height: 220px; min-width: 640px; padding: 8px 4px 0; }
      .trend-item { width: 42px; text-align: center; }
      .trend-bar { width: 100%; border-radius: 4px 4px 0 0; background: #1677ff; min-height: 4px; }
      .trend-count { font-size: 11px; color: #666; margin-bottom: 4px; }
      .trend-date { margin-top: 6px; font-size: 10px; color: #888; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { App, Button, Card, Col, Descriptions, Input, Layout, Row, Select, Space, Statistic, Table, Tabs, Tag, Typography } = antd;
      const { Header, Content } = Layout;
      const { Text } = Typography;

      const I18N = {
        en: {
          dashboardTitle: "Echo Fade Memory Dashboard",
          language: "Language",
          healthCheck: "Health Check",
          refreshMonitor: "Refresh Monitor",
          refreshWorkbench: "Refresh Workbench",
          overview: "Overview",
          detail: "Detail",
          workbench: "Workbench",
          serviceHealth: "Service Health",
          healthSummary: "Health Summary",
          integrityStatus: "Integrity Status",
          backend: "Backend",
          sqlTotal: "SQL Total",
          vectorTotal: "Vector Total",
          missingInVector: "Missing In Vector",
          brokenFilePaths: "Broken File Paths",
          orphanImages: "Orphan Images",
          totalMemories: "Total Memories",
          totalImages: "Total Images",
          totalEntities: "Total Entities",
          avgClarity: "Avg Clarity",
          captionCoverage: "Caption Coverage",
          ocrCoverage: "OCR Coverage",
          linkedCoverage: "Linked Coverage",
          topNew: "Top{topK} New Memories",
          topRisk: "Top{topK} Decay Risk",
          topAccess: "Top{topK} Most Accessed",
          topRecentImages: "Top{topK} Recent Images",
          topLinkedImages: "Top{topK} Linked Images",
          topEntities: "Top{topK} Entities",
          lifecycleDistribution: "Lifecycle Distribution",
          decayStageDistribution: "Decay Stage Distribution",
          memoryTypeDistribution: "Memory Type Distribution",
          imageSourceDistribution: "Image Source Distribution",
          createdTrend: "Memory Created Trend ({days}d)",
          imageTrend: "Image Created Trend ({days}d)",
          workbenchTitle: "Federated Workbench",
          query: "Query",
          searchAll: "Search All",
          noTrendData: "No trend data",
          noData: "No data",
          lastRefresh: "Last Refresh",
          mixedResults: "Mixed Results",
          memoryResults: "Memory Results",
          imageResults: "Image Results",
          entityResults: "Entity Results",
          explainSummary: "Explain Summary",
          accepted: "Accepted",
          filtered: "Filtered",
          count: "Count",
          name: "Name",
          summary: "Summary",
          type: "Type",
          created: "Created",
          clarity: "Clarity",
          score: "Score",
          risk: "Risk",
          access: "Access",
          idleDays: "Idle Days",
          stage: "Stage",
          file: "File",
          sourceSession: "Source Session",
          linkCount: "Link Count",
          objectType: "Object Type",
          title: "Title",
          statusOk: "ok",
          statusUnhealthy: "unhealthy",
          unknown: "unknown",
          queryRequired: "query required",
          healthCheckFailed: "health check failed",
          overviewFailed: "overview failed",
          detailFailed: "detail failed",
          workbenchFailed: "workbench failed",
          refreshed: "refreshed"
        },
        zh: {
          dashboardTitle: "Echo Fade Memory 控制台",
          language: "语言",
          healthCheck: "健康检查",
          refreshMonitor: "刷新监控",
          refreshWorkbench: "刷新工作台",
          overview: "总览",
          detail: "明细",
          workbench: "工作台",
          serviceHealth: "服务健康",
          healthSummary: "健康摘要",
          integrityStatus: "一致性状态",
          backend: "后端",
          sqlTotal: "SQL 总数",
          vectorTotal: "向量总数",
          missingInVector: "向量缺失数",
          brokenFilePaths: "失效图片路径",
          orphanImages: "孤立图片数",
          totalMemories: "记忆总量",
          totalImages: "图片总量",
          totalEntities: "实体总量",
          avgClarity: "平均清晰度",
          captionCoverage: "描述覆盖率",
          ocrCoverage: "OCR 覆盖率",
          linkedCoverage: "链接覆盖率",
          topNew: "最近新增 Top{topK}",
          topRisk: "衰减风险 Top{topK}",
          topAccess: "高频访问 Top{topK}",
          topRecentImages: "最近图片 Top{topK}",
          topLinkedImages: "高链接图片 Top{topK}",
          topEntities: "实体 Top{topK}",
          lifecycleDistribution: "生命周期分布",
          decayStageDistribution: "衰减阶段分布",
          memoryTypeDistribution: "记忆类型分布",
          imageSourceDistribution: "图片来源分布",
          createdTrend: "记忆新增趋势（{days}天）",
          imageTrend: "图片新增趋势（{days}天）",
          workbenchTitle: "联动工作台",
          query: "查询词",
          searchAll: "联动检索",
          noTrendData: "暂无趋势数据",
          noData: "暂无数据",
          lastRefresh: "最近刷新",
          mixedResults: "混合结果",
          memoryResults: "记忆结果",
          imageResults: "图片结果",
          entityResults: "实体结果",
          explainSummary: "Explain 摘要",
          accepted: "通过",
          filtered: "过滤",
          count: "数量",
          name: "名称",
          summary: "摘要",
          type: "类型",
          created: "创建时间",
          clarity: "清晰度",
          score: "分数",
          risk: "风险值",
          access: "访问次数",
          idleDays: "闲置天数",
          stage: "阶段",
          file: "文件",
          sourceSession: "来源会话",
          linkCount: "链接数",
          objectType: "对象类型",
          title: "标题",
          statusOk: "正常",
          statusUnhealthy: "异常",
          unknown: "未知",
          queryRequired: "请输入查询词",
          healthCheckFailed: "健康检查失败",
          overviewFailed: "总览请求失败",
          detailFailed: "明细请求失败",
          workbenchFailed: "工作台请求失败",
          refreshed: "已刷新"
        }
      };

      const fetchJSON = async (url, options) => {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error((payload && payload.error) || "request failed");
        return payload;
      };

      const api = {
        health: () => fetchJSON("/v1/healthz"),
        overview: (windowDays, topK) => fetchJSON("/v1/dashboard/stats/overview?window_days=" + encodeURIComponent(windowDays) + "&top_k=" + encodeURIComponent(topK)),
        detail: (windowDays, topK, sampleSize) => fetchJSON("/v1/dashboard/stats/detail?window_days=" + encodeURIComponent(windowDays) + "&top_k=" + encodeURIComponent(topK) + "&sample_size=" + encodeURIComponent(sampleSize)),
        workbench: (query, k) =>
          fetchJSON("/v1/dashboard/workbench/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query, k: Number(k) })
          })
      };

      const LOCALE_STORAGE_KEY = "echo-fade-memory.dashboard.locale";
      const mapToRows = (obj) => Object.entries(obj || {}).map(([name, count]) => ({ key: name, name: name, count: Number(count || 0) })).sort((a, b) => b.count - a.count);
      const ratioPercent = (value) => Number(value || 0) * 100;

      const readSavedLocale = () => {
        try {
          const saved = window.localStorage.getItem(LOCALE_STORAGE_KEY);
          return saved === "zh" ? "zh" : "en";
        } catch (_) {
          return "en";
        }
      };

      function TrendChart({ points, emptyText }) {
        const safePoints = Array.isArray(points) ? points : [];
        if (!safePoints.length) {
          return <Text type="secondary">{emptyText}</Text>;
        }
        const max = safePoints.reduce((acc, item) => Math.max(acc, Number((item && item.count) || 0)), 0);
        return (
          <div className="trend-chart">
            <div className="trend-bars">
              {safePoints.map((item) => {
                const count = Number((item && item.count) || 0);
                const height = max > 0 ? Math.max(6, Math.round((count / max) * 180)) : 6;
                const label = String((item && item.date) || "").slice(5);
                return (
                  <div className="trend-item" key={item.date || label}>
                    <div className="trend-count">{count}</div>
                    <div className="trend-bar" style={{ height: height + "px" }} />
                    <div className="trend-date">{label}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      function Dashboard() {
        const { message } = App.useApp();
        const [locale, setLocale] = React.useState(readSavedLocale);
        const [activeTab, setActiveTab] = React.useState("overview");
        const [windowDays] = React.useState(30);
        const [topK] = React.useState(10);
        const [sampleSize] = React.useState(200);
        const [query, setQuery] = React.useState("project");
        const [k, setK] = React.useState(5);
        const [health, setHealth] = React.useState("unknown");
        const [overview, setOverview] = React.useState(null);
        const [detail, setDetail] = React.useState(null);
        const [workbench, setWorkbench] = React.useState(null);
        const [overviewLoading, setOverviewLoading] = React.useState(false);
        const [detailLoading, setDetailLoading] = React.useState(false);
        const [workbenchLoading, setWorkbenchLoading] = React.useState(false);
        const [lastWorkbenchRefresh, setLastWorkbenchRefresh] = React.useState(null);

        const t = React.useCallback((key, vars) => {
          const dict = I18N[locale] || I18N.en;
          let text = dict[key] || I18N.en[key] || key;
          if (vars) {
            Object.keys(vars).forEach((name) => {
              text = text.replace("{" + name + "}", String(vars[name]));
            });
          }
          return text;
        }, [locale]);

        const statusText = React.useCallback((value) => {
          if (value === "ok") return t("statusOk");
          if (value === "unhealthy") return t("statusUnhealthy");
          return value || t("unknown");
        }, [t]);

        React.useEffect(() => {
          document.documentElement.setAttribute("lang", locale === "zh" ? "zh-CN" : "en");
          try {
            window.localStorage.setItem(LOCALE_STORAGE_KEY, locale);
          } catch (_) {}
        }, [locale]);

        const loadHealth = React.useCallback(async (silent) => {
          try {
            const result = await api.health();
            setHealth(result.status || "ok");
          } catch (error) {
            setHealth("unhealthy");
            if (!silent) message.error(t("healthCheckFailed") + ": " + error.message);
          }
        }, [message, t]);

        const loadMonitor = React.useCallback(async (silent) => {
          if (!silent) {
            setOverviewLoading(true);
            setDetailLoading(true);
          }
          try {
            const [overviewResult, detailResult] = await Promise.all([
              api.overview(windowDays, topK),
              api.detail(windowDays, topK, sampleSize)
            ]);
            setOverview(overviewResult || null);
            setDetail(detailResult || null);
            if (!silent) message.success(t("refreshed"));
          } catch (error) {
            if (!silent) message.error(t("overviewFailed") + ": " + error.message);
          } finally {
            if (!silent) {
              setOverviewLoading(false);
              setDetailLoading(false);
            }
          }
        }, [message, sampleSize, t, topK, windowDays]);

        const runWorkbench = React.useCallback(async (silent) => {
          const trimmed = query.trim();
          if (!trimmed) {
            message.warning(t("queryRequired"));
            return;
          }
          setWorkbenchLoading(true);
          try {
            const result = await api.workbench(trimmed, k);
            setWorkbench(result || null);
            setLastWorkbenchRefresh(new Date());
            if (!silent) message.success(t("refreshed"));
          } catch (error) {
            if (!silent) message.error(t("workbenchFailed") + ": " + error.message);
          } finally {
            setWorkbenchLoading(false);
          }
        }, [k, message, query, t]);

        React.useEffect(() => {
          loadHealth(true);
          loadMonitor(true);
        }, [loadHealth, loadMonitor]);

        React.useEffect(() => {
          const timer = window.setInterval(() => {
            loadHealth(true);
            loadMonitor(true);
          }, 30000);
          return () => window.clearInterval(timer);
        }, [loadHealth, loadMonitor]);

        const memoryColumns = [
          { title: t("summary"), dataIndex: "summary", key: "summary", ellipsis: true },
          { title: t("type"), dataIndex: "memory_type", key: "memory_type", width: 120 },
          { title: t("created"), dataIndex: "created_at", key: "created_at", width: 170, render: (value) => value ? dayjs(value).format("MM-DD HH:mm") : "-" },
          { title: t("clarity"), dataIndex: "clarity", key: "clarity", width: 90, render: (value) => Number(value || 0).toFixed(2) }
        ];

        const riskColumns = [
          { title: t("summary"), dataIndex: "summary", key: "summary", ellipsis: true },
          { title: t("risk"), dataIndex: "risk_score", key: "risk_score", width: 90, render: (value) => Number(value || 0).toFixed(2) },
          { title: t("idleDays"), dataIndex: "idle_days", key: "idle_days", width: 90 },
          { title: t("stage"), dataIndex: "decay_stage", key: "decay_stage", width: 120 }
        ];

        const accessColumns = [
          { title: t("summary"), dataIndex: "summary", key: "summary", ellipsis: true },
          { title: t("access"), dataIndex: "access_count", key: "access_count", width: 90 },
          { title: t("type"), dataIndex: "memory_type", key: "memory_type", width: 120 },
          { title: t("clarity"), dataIndex: "clarity", key: "clarity", width: 90, render: (value) => Number(value || 0).toFixed(2) }
        ];

        const imageColumns = [
          { title: t("summary"), dataIndex: "caption", key: "caption", ellipsis: true },
          { title: t("file"), dataIndex: "file_path", key: "file_path", ellipsis: true, render: (_, row) => row.file_path || row.url || row.id },
          { title: t("linkCount"), dataIndex: "link_count", key: "link_count", width: 100 },
          { title: t("created"), dataIndex: "created_at", key: "created_at", width: 170, render: (value) => value ? dayjs(value).format("MM-DD HH:mm") : "-" }
        ];

        const entityColumns = [
          { title: t("name"), dataIndex: "display_name", key: "display_name", ellipsis: true, render: (_, row) => row.display_name || row.canonical_name || row.id },
          { title: t("type"), dataIndex: "entity_type", key: "entity_type", width: 120 },
          { title: t("count"), dataIndex: "memory_count", key: "memory_count", width: 90 }
        ];

        const distributionColumns = [
          { title: t("name"), dataIndex: "name", key: "name" },
          { title: t("count"), dataIndex: "count", key: "count", width: 90 }
        ];

        const mixedColumns = [
          { title: t("objectType"), dataIndex: "object_type", key: "object_type", width: 120, render: (value) => <Tag color={value === "memory" ? "blue" : value === "image" ? "gold" : "purple"}>{value || t("unknown")}</Tag> },
          { title: t("title"), dataIndex: "title", key: "title", ellipsis: true },
          { title: t("summary"), dataIndex: "summary", key: "summary", ellipsis: true },
          { title: t("score"), dataIndex: "score", key: "score", width: 90, render: (value) => Number(value || 0).toFixed(2) }
        ];

        const workbenchMemoryColumns = [
          { title: t("summary"), dataIndex: "summary", key: "summary", ellipsis: true },
          { title: t("score"), dataIndex: "score", key: "score", width: 90, render: (value) => Number(value || 0).toFixed(2) },
          { title: t("stage"), dataIndex: "decay_stage", key: "decay_stage", width: 120 }
        ];

        const workbenchImageColumns = [
          { title: t("summary"), dataIndex: "caption", key: "caption", ellipsis: true },
          { title: t("score"), dataIndex: "score", key: "score", width: 90, render: (value) => Number(value || 0).toFixed(2) },
          { title: t("sourceSession"), dataIndex: "source_session", key: "source_session", width: 150 }
        ];

        const workbenchEntityColumns = [
          { title: t("name"), dataIndex: "display_name", key: "display_name", ellipsis: true, render: (_, row) => row.display_name || row.canonical_name || row.id },
          { title: t("type"), dataIndex: "entity_type", key: "entity_type", width: 120 },
          { title: t("count"), dataIndex: "memory_count", key: "memory_count", width: 90 }
        ];

        const overviewIntegrity = detail && detail.integrity ? detail.integrity : null;
        const imageStats = detail && detail.images ? detail.images : null;
        const entityStats = detail && detail.entities ? detail.entities : null;
        const mixedResults = workbench && Array.isArray(workbench.mixed) ? workbench.mixed : [];
        const workbenchMemories = workbench && Array.isArray(workbench.memories) ? workbench.memories : [];
        const workbenchImages = workbench && Array.isArray(workbench.images) ? workbench.images : [];
        const workbenchEntities = workbench && Array.isArray(workbench.entities) ? workbench.entities : [];
        const explain = workbench && workbench.explain ? workbench.explain : null;

        const tabItems = [
          {
            key: "overview",
            label: t("overview"),
            children: (
              <Space direction="vertical" size={16} style={{ width: "100%" }}>
                <Row gutter={[16, 16]}>
                  <Col xs={24} sm={12} lg={6}><Card loading={overviewLoading}><Statistic title={t("serviceHealth")} value={statusText(health)} /></Card></Col>
                  <Col xs={24} sm={12} lg={6}><Card loading={overviewLoading}><Statistic title={t("totalMemories")} value={overview ? overview.total_memories || 0 : 0} /></Card></Col>
                  <Col xs={24} sm={12} lg={6}><Card loading={detailLoading}><Statistic title={t("totalImages")} value={imageStats ? imageStats.total_images || 0 : 0} /></Card></Col>
                  <Col xs={24} sm={12} lg={6}><Card loading={detailLoading}><Statistic title={t("totalEntities")} value={entityStats ? entityStats.total_entities || 0 : 0} /></Card></Col>
                </Row>
                <Row gutter={[16, 16]}>
                  <Col xs={24} sm={8}><Card loading={overviewLoading}><Statistic title={t("avgClarity")} value={overview ? Number((overview.quality || {}).avg_clarity || 0).toFixed(2) : "0.00"} /></Card></Col>
                  <Col xs={24} sm={8}><Card loading={detailLoading}><Statistic title={t("captionCoverage")} value={imageStats ? ratioPercent(imageStats.caption_coverage || 0).toFixed(1) : "0.0"} suffix="%" /></Card></Col>
                  <Col xs={24} sm={8}><Card loading={detailLoading}><Statistic title={t("ocrCoverage")} value={imageStats ? ratioPercent(imageStats.ocr_coverage || 0).toFixed(1) : "0.0"} suffix="%" /></Card></Col>
                </Row>
                <Card title={t("healthSummary")} loading={detailLoading}>
                  <Descriptions size="small" column={2}>
                    <Descriptions.Item label={t("backend")}>{overviewIntegrity ? overviewIntegrity.vector_backend : "-"}</Descriptions.Item>
                    <Descriptions.Item label={t("integrityStatus")}><Tag color={overviewIntegrity && overviewIntegrity.status === "ok" ? "green" : "orange"}>{overviewIntegrity ? overviewIntegrity.status : t("unknown")}</Tag></Descriptions.Item>
                    <Descriptions.Item label={t("sqlTotal")}>{overviewIntegrity ? overviewIntegrity.sql_total || 0 : 0}</Descriptions.Item>
                    <Descriptions.Item label={t("vectorTotal")}>{overviewIntegrity && overviewIntegrity.vector_total >= 0 ? overviewIntegrity.vector_total : "-"}</Descriptions.Item>
                    <Descriptions.Item label={t("missingInVector")}>{overviewIntegrity ? overviewIntegrity.missing_in_vector || 0 : 0}</Descriptions.Item>
                    <Descriptions.Item label={t("brokenFilePaths")}>{imageStats ? imageStats.broken_file_paths || 0 : 0}</Descriptions.Item>
                    <Descriptions.Item label={t("orphanImages")}>{imageStats ? imageStats.orphan_images || 0 : 0}</Descriptions.Item>
                    <Descriptions.Item label={t("linkedCoverage")}>{imageStats ? ratioPercent(imageStats.linked_coverage || 0).toFixed(1) + "%" : "0.0%"}</Descriptions.Item>
                  </Descriptions>
                </Card>
              </Space>
            )
          },
          {
            key: "detail",
            label: t("detail"),
            children: (
              <Space direction="vertical" size={16} style={{ width: "100%" }}>
                <Row gutter={[16, 16]}>
                  <Col xs={24} lg={8}><Card title={t("topNew", { topK: topK })} loading={detailLoading}><Table size="small" pagination={false} columns={memoryColumns} dataSource={detail && detail.overview ? detail.overview.top_new_memories || [] : []} rowKey={(row, idx) => row.id || idx} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={8}><Card title={t("topRisk", { topK: topK })} loading={detailLoading}><Table size="small" pagination={false} columns={riskColumns} dataSource={detail && detail.overview ? detail.overview.top_decay_risk_memories || [] : []} rowKey={(row, idx) => row.id || idx} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={8}><Card title={t("topAccess", { topK: topK })} loading={detailLoading}><Table size="small" pagination={false} columns={accessColumns} dataSource={detail && detail.overview ? detail.overview.top_accessed_memories || [] : []} rowKey={(row, idx) => row.id || idx} locale={{ emptyText: t("noData") }} /></Card></Col>
                </Row>
                <Row gutter={[16, 16]}>
                  <Col xs={24} lg={8}><Card title={t("topRecentImages", { topK: topK })} loading={detailLoading}><Table size="small" pagination={false} columns={imageColumns} dataSource={imageStats ? imageStats.top_recent_images || [] : []} rowKey={(row, idx) => row.id || idx} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={8}><Card title={t("topLinkedImages", { topK: topK })} loading={detailLoading}><Table size="small" pagination={false} columns={imageColumns} dataSource={imageStats ? imageStats.top_linked_images || [] : []} rowKey={(row, idx) => row.id || idx} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={8}><Card title={t("topEntities", { topK: topK })} loading={detailLoading}><Table size="small" pagination={false} columns={entityColumns} dataSource={entityStats ? entityStats.top_entities || [] : []} rowKey={(row, idx) => row.id || idx} locale={{ emptyText: t("noData") }} /></Card></Col>
                </Row>
                <Row gutter={[16, 16]}>
                  <Col xs={24} lg={12}><Card title={t("createdTrend", { days: windowDays })} loading={detailLoading}><TrendChart points={detail && detail.overview ? detail.overview.trend_created_daily : []} emptyText={t("noTrendData")} /></Card></Col>
                  <Col xs={24} lg={12}><Card title={t("imageTrend", { days: windowDays })} loading={detailLoading}><TrendChart points={imageStats ? imageStats.trend_created_daily : []} emptyText={t("noTrendData")} /></Card></Col>
                </Row>
                <Row gutter={[16, 16]}>
                  <Col xs={24} lg={6}><Card title={t("memoryTypeDistribution")} loading={detailLoading}><Table size="small" pagination={false} columns={distributionColumns} dataSource={mapToRows(detail && detail.overview ? detail.overview.by_memory_type : null)} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={6}><Card title={t("lifecycleDistribution")} loading={detailLoading}><Table size="small" pagination={false} columns={distributionColumns} dataSource={mapToRows(detail && detail.overview ? detail.overview.by_lifecycle_state : null)} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={6}><Card title={t("decayStageDistribution")} loading={detailLoading}><Table size="small" pagination={false} columns={distributionColumns} dataSource={mapToRows(detail && detail.overview ? detail.overview.by_decay_stage : null)} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={6}><Card title={t("imageSourceDistribution")} loading={detailLoading}><Table size="small" pagination={false} columns={distributionColumns} dataSource={mapToRows(imageStats ? imageStats.by_source_kind : null)} locale={{ emptyText: t("noData") }} /></Card></Col>
                </Row>
              </Space>
            )
          },
          {
            key: "workbench",
            label: t("workbench"),
            children: (
              <Space direction="vertical" size={16} style={{ width: "100%" }}>
                <Card title={t("workbenchTitle")}>
                  <Space wrap style={{ marginBottom: 16 }}>
                    <Input placeholder={t("query")} value={query} onChange={(event) => setQuery(event.target.value)} style={{ width: 360 }} onPressEnter={() => runWorkbench(false)} />
                    <Select value={k} onChange={setK} style={{ width: 100 }} options={[3, 5, 10, 20].map((value) => ({ value: value, label: "k=" + value }))} />
                    <Button type="primary" loading={workbenchLoading} onClick={() => runWorkbench(false)}>{t("searchAll")}</Button>
                  </Space>
                  <Row gutter={[16, 16]}>
                    <Col xs={24} sm={12} lg={6}><Statistic title={t("lastRefresh")} value={lastWorkbenchRefresh ? dayjs(lastWorkbenchRefresh).format("HH:mm:ss") : "-"} /></Col>
                    <Col xs={24} sm={12} lg={6}><Statistic title={t("mixedResults")} value={mixedResults.length} /></Col>
                    <Col xs={24} sm={12} lg={6}><Statistic title={t("memoryResults")} value={workbenchMemories.length} /></Col>
                    <Col xs={24} sm={12} lg={6}><Statistic title={t("imageResults")} value={workbenchImages.length} /></Col>
                  </Row>
                </Card>
                <Card title={t("mixedResults")} loading={workbenchLoading}>
                  <Table size="small" columns={mixedColumns} dataSource={mixedResults} rowKey={(row, idx) => row.object_type + ":" + (row.id || idx)} pagination={{ pageSize: 8 }} locale={{ emptyText: t("noData") }} />
                </Card>
                <Row gutter={[16, 16]}>
                  <Col xs={24} lg={12}><Card title={t("memoryResults")} loading={workbenchLoading}><Table size="small" columns={workbenchMemoryColumns} dataSource={workbenchMemories} rowKey={(row, idx) => row.id || idx} pagination={{ pageSize: 5 }} locale={{ emptyText: t("noData") }} /></Card></Col>
                  <Col xs={24} lg={12}><Card title={t("imageResults")} loading={workbenchLoading}><Table size="small" columns={workbenchImageColumns} dataSource={workbenchImages} rowKey={(row, idx) => row.id || idx} pagination={{ pageSize: 5 }} locale={{ emptyText: t("noData") }} /></Card></Col>
                </Row>
                <Card title={t("entityResults")} loading={workbenchLoading}>
                  <Table size="small" columns={workbenchEntityColumns} dataSource={workbenchEntities} rowKey={(row, idx) => row.id || idx} pagination={{ pageSize: 6 }} locale={{ emptyText: t("noData") }} />
                </Card>
                <Card title={t("explainSummary")} loading={workbenchLoading}>
                  {!explain ? (
                    <Text type="secondary">{t("noData")}</Text>
                  ) : (
                    <Descriptions size="small" column={2}>
                      <Descriptions.Item label={t("query")}>{explain.query || "-"}</Descriptions.Item>
                      <Descriptions.Item label={t("accepted")}>{Array.isArray(explain.accepted) ? explain.accepted.length : 0}</Descriptions.Item>
                      <Descriptions.Item label={t("filtered")}>{Array.isArray(explain.filtered) ? explain.filtered.length : 0}</Descriptions.Item>
                      <Descriptions.Item label={t("lastRefresh")}>{lastWorkbenchRefresh ? dayjs(lastWorkbenchRefresh).format("YYYY-MM-DD HH:mm:ss") : "-"}</Descriptions.Item>
                    </Descriptions>
                  )}
                </Card>
              </Space>
            )
          }
        ];

        return (
          <Layout style={{ minHeight: "100vh" }}>
            <Header className="app-header">
              <h1 className="app-header-title">{t("dashboardTitle")}</h1>
              <Space>
                <Text style={{ color: "#fff" }}>{t("language")}</Text>
                <Select size="small" value={locale} onChange={setLocale} style={{ width: 92 }} options={[{ value: "en", label: "EN" }, { value: "zh", label: "中文" }]} />
                <Button onClick={() => loadHealth(false)}>{t("healthCheck")}</Button>
                <Button loading={overviewLoading || detailLoading} onClick={() => loadMonitor(false)}>{t("refreshMonitor")}</Button>
                <Button type="primary" loading={workbenchLoading} onClick={() => runWorkbench(false)}>{t("refreshWorkbench")}</Button>
              </Space>
            </Header>
            <Content style={{ padding: 24 }}>
              <Tabs activeKey={activeTab} onChange={setActiveTab} items={tabItems} />
            </Content>
          </Layout>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App><Dashboard /></App>);
    </script>
  </body>
</html>
